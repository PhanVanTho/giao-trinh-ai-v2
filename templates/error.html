<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lỗi - Giáo Trình AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 650px; padding-top: 5rem;">
        <div class="text-center mb-4 animate-fade-in-up">
            <div style="font-size: 3rem; color: var(--danger); margin-bottom: 1rem;">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700;">Đã xảy ra lỗi</h1>
            <p class="text-muted" style="font-size: 0.85rem;">Mã công việc: <code style="color: var(--primary);">{{ ma_cv }}</code></p>
        </div>

        <div class="glass-card p-4 animate-fade-in-up animate-delay-1">
            <div class="mb-3">
                <span class="badge bg-danger px-3 py-2">
                    <i class="fa-solid fa-xmark me-1"></i>Thất bại
                </span>
            </div>

            <label class="form-label">Thông báo lỗi</label>
            <pre style="background: var(--bg-surface-1); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 1rem; color: var(--danger); white-space: pre-wrap; font-size: 0.85rem;">{{ thong_tin.loi }}</pre>

            <label class="form-label mt-2">Chi tiết debug</label>
            <pre style="background: var(--bg-surface-1); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 1rem; color: var(--text-dim); white-space: pre-wrap; font-size: 0.75rem; max-height: 250px; overflow-y: auto;">{{ thong_tin.chi_tiet }}</pre>

            <div class="mt-4">
                <a class="btn btn-primary" href="/">
                    <i class="fa-solid fa-arrow-left me-1"></i>Quay lại trang chủ
                </a>
            </div>
        </div>

        <div class="text-center mt-3" style="font-size: 0.78rem; color: var(--text-dim);">
            <i class="fa-solid fa-lightbulb me-1"></i>
            Gợi ý: giảm top_k hoặc số trang liên kết nếu gặp lỗi "quá dài".
        </div>
    </div>
</body>
</html>
